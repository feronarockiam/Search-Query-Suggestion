<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OZi Search</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="search-container">
        <h1 class="logo">OZi</h1>
        <p class="subtitle">Find everything for your little one</p>

        <div class="search-box">
            <div class="input-wrapper">
                <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
                <input type="text" id="searchInput" placeholder="Search brands, diapers, toys..." autocomplete="off">
            </div>

            <!-- Loader initially hidden -->
            <div class="loader" id="loader"></div>

            <div class="autocomplete-dropdown" id="dropdown">
                <ul id="suggestionList" class="suggestion-list"></ul>
                <!-- Footer for query state -->
                <div class="dropdown-footer" id="dropdownFooter"></div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>

</html>
